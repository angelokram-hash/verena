<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <!-- Outer oval -->
  <ellipse cx="100" cy="120" rx="95" ry="115" fill="none" stroke="#1c1917" stroke-width="3"/>
  <ellipse cx="100" cy="120" rx="88" ry="108" fill="none" stroke="#1c1917" stroke-width="1.5"/>

  <!-- Top arc text: MIRANDA KONSTANTINIDOU -->
  <path id="topArc" d="M 18,100 A 82,82 0 0,1 182,100" fill="none"/>
  <text font-family="Georgia, serif" font-size="9.5" fill="#1c1917" letter-spacing="1.8">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">MIRANDA KONSTANTINIDOU</textPath>
  </text>

  <!-- Bottom arc text: CERTIFIED -->
  <path id="bottomArc" d="M 25,145 A 75,75 0 0,0 175,145" fill="none"/>
  <text font-family="Georgia, serif" font-size="10" fill="#1c1917" letter-spacing="3">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">CERTIFIED</textPath>
  </text>

  <!-- Center decoration -->
  <!-- Crown -->
  <path d="M 82,72 L 88,60 L 100,68 L 112,60 L 118,72 Z" fill="none" stroke="#1c1917" stroke-width="2" stroke-linejoin="round"/>
  <rect x="82" y="72" width="36" height="6" rx="1" fill="none" stroke="#1c1917" stroke-width="1.5"/>

  <!-- Heart -->
  <path d="M 100,108 C 100,108 85,96 85,87 C 85,82 88,78 92,78 C 96,78 100,82 100,82 C 100,82 104,78 108,78 C 112,78 115,82 115,87 C 115,96 100,108 100,108 Z" fill="none" stroke="#1c1917" stroke-width="2"/>

  <!-- EST / AD lines -->
  <text x="72" y="122" font-family="Georgia, serif" font-size="8" fill="#1c1917" text-anchor="middle">EST.</text>
  <text x="128" y="122" font-family="Georgia, serif" font-size="8" fill="#1c1917" text-anchor="middle">AD</text>
  <text x="72" y="133" font-family="Georgia, serif" font-size="11" fill="#1c1917" text-anchor="middle" font-weight="bold">19</text>
  <text x="128" y="133" font-family="Georgia, serif" font-size="11" fill="#1c1917" text-anchor="middle" font-weight="bold">86</text>

  <!-- KONPLOTT text (upside down at bottom like the logo) -->
  <text x="100" y="168" font-family="Georgia, serif" font-size="14" fill="#1c1917" text-anchor="middle" font-weight="bold" letter-spacing="2">KONPLOTT</text>

  <!-- Globe decoration -->
  <circle cx="100" cy="152" r="10" fill="none" stroke="#1c1917" stroke-width="1.5"/>
  <ellipse cx="100" cy="152" rx="5" ry="10" fill="none" stroke="#1c1917" stroke-width="1"/>
  <line x1="90" y1="152" x2="110" y2="152" stroke="#1c1917" stroke-width="1"/>
</svg>
